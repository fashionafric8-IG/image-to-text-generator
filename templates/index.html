<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCR Tool | ToolsFlash</title>
    
    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        brand: {
                            cyan: '#00f2fe',
                            purple: '#7b61ff',
                            dark: '#0a0a0a',
                        }
                    },
                    animation: {
                        'gradient': 'gradient 8s linear infinite',
                        'scan': 'scan 2.5s ease-in-out infinite',
                    },
                    keyframes: {
                        gradient: {
                            '0%, 100%': { 'background-size': '200% 200%', 'background-position': 'left center' },
                            '50%': { 'background-size': '200% 200%', 'background-position': 'right center' },
                        },
                        scan: {
                            '0%, 100%': { top: '0%', opacity: 0 },
                            '50%': { top: '100%', opacity: 1 },
                        }
                    }
                }
            }
        }
    </script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        body {
            background-color: #0a0a0a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .toolsflash-gradient {
            background: linear-gradient(135deg, #00f2fe 0%, #7b61ff 100%);
        }

        .toolsflash-gradient-text {
            background: linear-gradient(135deg, #00f2fe 0%, #7b61ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .input-area {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        .input-area:hover {
            border-color: rgba(0, 242, 254, 0.3);
            background: rgba(0, 0, 0, 0.4);
        }

        .btn-primary {
            background: linear-gradient(135deg, #00f2fe 0%, #7b61ff 100%);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(123, 97, 255, 0.4);
            filter: brightness(1.1);
        }

        .scan-line {
            height: 2px;
            background: linear-gradient(90deg, transparent, #00f2fe, transparent);
            position: absolute;
            width: 100%;
            z-index: 20;
            box-shadow: 0 0 15px #00f2fe;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
    </style>
</head>
<body class="text-gray-100 antialiased selection:bg-purple-500/30 p-6">

    <div class="w-full max-w-4xl mx-auto space-y-12">
        
        <!-- Small Centered Title (Serif) -->
        <header class="text-center">
            <h1 class="text-xl font-serif text-white tracking-wide mb-1">
                Image-to-Text <span class="toolsflash-gradient-text italic font-bold">OCR</span>
            </h1>
            <div class="w-12 h-[1px] toolsflash-gradient mx-auto opacity-50"></div>
        </header>

        <!-- Tool Container -->
        <div class="glass-panel rounded-3xl overflow-hidden grid grid-cols-1 md:grid-cols-2">
            
            <!-- Left Side: Upload -->
            <div class="p-8 lg:p-10 border-b md:border-b-0 md:border-r border-white/5 space-y-8">
                <div class="flex items-center justify-between">
                    <h2 class="text-sm font-semibold uppercase tracking-widest text-gray-500">Step 1: Upload</h2>
                    <i data-lucide="image" class="w-4 h-4 text-brand-cyan"></i>
                </div>

                <div id="drop-zone" class="input-area rounded-2xl h-[300px] flex flex-col items-center justify-center text-center p-6 cursor-pointer relative group overflow-hidden">
                    <div id="upload-prompt" class="space-y-4">
                        <div class="w-14 h-14 rounded-xl bg-brand-cyan/10 flex items-center justify-center mx-auto group-hover:scale-110 transition-transform duration-300">
                            <i data-lucide="upload-cloud" class="w-7 h-7 text-brand-cyan"></i>
                        </div>
                        <div>
                            <p class="font-bold text-white">Drop your image</p>
                            <p class="text-xs text-gray-500 mt-1">or click to browse files</p>
                        </div>
                    </div>

                    <div id="preview-container" class="hidden absolute inset-0 p-3 w-full h-full">
                        <div class="relative w-full h-full bg-black/40 rounded-xl overflow-hidden flex items-center justify-center">
                            <img id="image-preview" src="" alt="Preview" class="max-w-full max-h-full object-contain">
                            <div id="scan-line" class="scan-line hidden animate-scan"></div>
                            <button id="remove-file" class="absolute top-2 right-2 p-1.5 bg-black/60 hover:bg-red-500/80 text-white rounded-lg backdrop-blur-md transition-all">
                                <i data-lucide="x" class="w-3 h-3"></i>
                            </button>
                        </div>
                    </div>

                    <input type="file" id="file-input" class="hidden" accept="image/*">
                </div>

                <button id="extract-btn" disabled class="w-full h-14 btn-primary text-white font-bold rounded-xl disabled:opacity-20 disabled:cursor-not-allowed disabled:transform-none flex items-center justify-center gap-3">
                    <span id="btn-text">Extract Text</span>
                    <i id="btn-icon" data-lucide="zap" class="w-4 h-4"></i>
                    <i id="btn-loader" data-lucide="loader-2" class="w-4 h-4 animate-spin hidden"></i>
                </button>
            </div>

            <!-- Right Side: Result -->
            <div class="p-8 lg:p-10 bg-black/20 flex flex-col space-y-8">
                <div class="flex items-center justify-between">
                    <h2 class="text-sm font-semibold uppercase tracking-widest text-gray-500">Step 2: Output</h2>
                    <div class="flex gap-1">
                        <button id="copy-btn" class="p-2 hover:bg-white/5 rounded-lg text-gray-400 hover:text-white transition-all" title="Copy">
                            <i data-lucide="copy" class="w-3.5 h-3.5"></i>
                        </button>
                        <button id="download-btn" class="p-2 hover:bg-white/5 rounded-lg text-gray-400 hover:text-white transition-all" title="Download">
                            <i data-lucide="download" class="w-3.5 h-3.5"></i>
                        </button>
                    </div>
                </div>

                <div class="input-area rounded-2xl flex-grow relative overflow-hidden flex flex-col min-h-[300px]">
                    <div id="placeholder-view" class="absolute inset-0 flex flex-col items-center justify-center text-center p-8 space-y-4 opacity-40">
                        <i data-lucide="terminal" class="w-10 h-10 text-brand-purple"></i>
                        <p class="text-xs max-w-[180px]">Run extraction to see the text results here.</p>
                    </div>

                    <textarea id="output-text" readonly class="hidden w-full h-full bg-transparent p-6 text-sm text-gray-300 font-mono leading-relaxed resize-none focus:outline-none" placeholder="Ready..."></textarea>
                </div>

                <div class="flex justify-between items-center px-1">
                    <div class="flex gap-4 text-[10px] text-gray-600 font-bold uppercase tracking-widest">
                        <span><span id="word-count" class="text-gray-400">0</span> Words</span>
                        <span><span id="char-count" class="text-gray-400">0</span> Chars</span>
                    </div>
                    <div class="text-[10px] text-brand-cyan font-bold uppercase tracking-widest flex items-center gap-1.5">
                        <span class="w-1 h-1 bg-brand-cyan rounded-full shadow-[0_0_8px_#00f2fe]"></span>
                        Engine Ready
                    </div>
                </div>
            </div>
        </div>

        <footer class="text-center">
            <p class="text-[10px] text-gray-700 font-bold uppercase tracking-[0.4em]">ToolsFlash Vision System</p>
        </footer>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 glass-panel px-6 py-3 rounded-full border-brand-purple/20 text-white text-xs font-bold uppercase tracking-widest shadow-2xl transition-all duration-300 translate-y-20 opacity-0 z-50 flex items-center gap-3">
        <i data-lucide="check" class="w-4 h-4 text-brand-cyan"></i>
        <span id="toast-message">Success</span>
    </div>

    <script>
        lucide.createIcons();

        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const uploadPrompt = document.getElementById('upload-prompt');
        const previewContainer = document.getElementById('preview-container');
        const imagePreview = document.getElementById('image-preview');
        const scanLine = document.getElementById('scan-line');
        const extractBtn = document.getElementById('extract-btn');
        const btnText = document.getElementById('btn-text');
        const btnIcon = document.getElementById('btn-icon');
        const btnLoader = document.getElementById('btn-loader');
        const outputText = document.getElementById('output-text');
        const placeholderView = document.getElementById('placeholder-view');
        const wordCount = document.getElementById('word-count');
        const charCount = document.getElementById('char-count');
        const toast = document.getElementById('toast');
        const toastMessage = document.getElementById('toast-message');

        let currentFile = null;

        function showToast(msg) {
            toastMessage.textContent = msg;
            toast.classList.remove('translate-y-20', 'opacity-0');
            toast.classList.add('translate-y-0', 'opacity-100');
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
                toast.classList.remove('translate-y-0', 'opacity-100');
            }, 3000);
        }

        function handleFile(file) {
            if (!file.type.startsWith('image/')) return showToast('Upload image only');
            currentFile = file;
            const reader = new FileReader();
            reader.onload = (e) => {
                imagePreview.src = e.target.result;
                uploadPrompt.classList.add('hidden');
                previewContainer.classList.remove('hidden');
                extractBtn.disabled = false;
            };
            reader.readAsDataURL(file);
        }

        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => handleFile(e.target.files[0]);
        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('border-brand-cyan/50'); };
        dropZone.ondragleave = () => dropZone.classList.remove('border-brand-cyan/50');
        dropZone.ondrop = (e) => { e.preventDefault(); handleFile(e.dataTransfer.files[0]); };

        document.getElementById('remove-file').onclick = (e) => {
            e.stopPropagation();
            currentFile = null;
            fileInput.value = '';
            uploadPrompt.classList.remove('hidden');
            previewContainer.classList.add('hidden');
            extractBtn.disabled = true;
            outputText.classList.add('hidden');
            placeholderView.classList.remove('hidden');
            wordCount.textContent = 0;
            charCount.textContent = 0;
        };

        extractBtn.onclick = async () => {
            if (!currentFile) return;
            const fd = new FormData();
            fd.append('image', currentFile);

            extractBtn.disabled = true;
            btnText.textContent = 'Processing...';
            btnIcon.classList.add('hidden');
            btnLoader.classList.remove('hidden');
            scanLine.classList.remove('hidden');
            placeholderView.classList.add('hidden');
            outputText.classList.remove('hidden');
            outputText.value = 'Analyzing...';

            try {
                const res = await fetch('/process', { method: 'POST', body: fd });
                const data = await res.json();
                if (res.ok) {
                    outputText.value = data.ocr_text || 'No text found.';
                    wordCount.textContent = outputText.value.trim().split(/\s+/).length;
                    charCount.textContent = outputText.value.length;
                } else {
                    outputText.value = 'Error: ' + data.error;
                }
            } catch (e) {
                outputText.value = 'Network error.';
            } finally {
                extractBtn.disabled = false;
                btnText.textContent = 'Extract Text';
                btnIcon.classList.remove('hidden');
                btnLoader.classList.add('hidden');
                scanLine.classList.add('hidden');
            }
        };

        document.getElementById('copy-btn').onclick = () => {
            if (!outputText.value) return;
            navigator.clipboard.writeText(outputText.value);
            showToast('Copied!');
        };

        document.getElementById('download-btn').onclick = async () => {
            if (!outputText.value) return;
            const res = await fetch('/api/download-txt', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: outputText.value })
            });
            if (res.ok) {
                const blob = await res.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'ocr-result.txt';
                document.body.appendChild(a);
                a.click();
                a.remove();
            }
        };
    </script>
</body>
</html>
